name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env: { POSTGRES_PASSWORD: test }
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install poetry && poetry install
      - run: black --check backend/ shared/
      - run: ruff check backend/ shared/
      - run: mypy backend/ shared/
      - run: pytest backend/ --cov=backend --cov-report=term-missing

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.x" }
      - run: cd apps/mobile && flutter pub get
      - run: cd apps/mobile && dart format --output=none --set-exit-if-changed .
      - run: cd apps/mobile && flutter analyze
      - run: cd apps/mobile && flutter test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker-compose.yml build
