services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on: [db, redis]

  marketplace:
    build:
      context: ..
      dockerfile: infra/Dockerfile.marketplace
    command: python backend/marketplace/manage.py runserver 0.0.0.0:8001
    ports:
      - "8001:8001"
    depends_on: [db]

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: terraforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  celery_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: python -c "print('celery worker placeholder')"
    depends_on: [redis, db]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

volumes:
  pgdata:
