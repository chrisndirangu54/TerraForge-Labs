services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      AUTH_STORE_BACKEND: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [db, redis]

  marketplace:
    build:
      context: ..
      dockerfile: infra/Dockerfile.marketplace
    command: python backend/marketplace/manage.py runserver 0.0.0.0:8001
    ports:
      - "8001:8001"
    depends_on: [db]

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: terraforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  celery_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: >
      celery -A backend.api.celery_app:celery_app worker
      --loglevel=info -Q default,reports -c 2
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      AUTH_STORE_BACKEND: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [redis, db]

  gpu_worker:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.gpu-worker
    command: >
      celery -A backend.api.celery_app:celery_app worker
      --loglevel=info -Q gpu -c 1
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
      NVIDIA_VISIBLE_DEVICES: all
    depends_on: [redis, api]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    depends_on: [api]

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: terraforge
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/terraforge.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/terraforge.json:/var/lib/grafana/dashboards/terraforge.json:ro
    depends_on: [prometheus]

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: terraforge-api
          metrics_path: /metrics
          static_configs:
            - targets: ["api:8000"]

volumes:
  pgdata:
  prometheus_data:
  grafana_data: