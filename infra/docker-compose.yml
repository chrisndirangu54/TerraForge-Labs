services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      AUTH_STORE_BACKEND: postgres
      INGEST_STORE_BACKEND: postgres
      STAC_CATALOG_BACKEND: postgres
      STORAGE_BACKEND: minio
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: terraforge
      MINIO_SECURE: "false"
      LLM_PROVIDER: gemini
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_MAX_RPM: "12"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  marketplace:
    build:
      context: ..
      dockerfile: infra/Dockerfile.marketplace
    command: python backend/marketplace/manage.py runserver 0.0.0.0:8001
    ports:
      - "8001:8001"
    depends_on: [db]

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: terraforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  celery_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: >
      celery -A backend.api.celery_app:celery_app worker
      --loglevel=info -Q default,reports -c 2
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      AUTH_STORE_BACKEND: postgres
      INGEST_STORE_BACKEND: postgres
      STAC_CATALOG_BACKEND: postgres
      STORAGE_BACKEND: minio
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: terraforge
      MINIO_SECURE: "false"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  gpu_worker:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.gpu-worker
    command: >
      celery -A backend.api.celery_app:celery_app worker
      --loglevel=info -Q gpu -c 1
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_STORE_BACKEND: postgres
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: terraforge
      MINIO_SECURE: "false"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: terraforge
      DB_USER: postgres
      DB_PASSWORD: postgres
      NVIDIA_VISIBLE_DEVICES: all
    depends_on: [redis, api]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb local/terraforge --ignore-existing;
      exit 0;
      "

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    depends_on: [api]

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: terraforge
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/terraforge.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/terraforge.json:/var/lib/grafana/dashboards/terraforge.json:ro
    depends_on: [prometheus]

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: terraforge-api
          metrics_path: /metrics
          static_configs:
            - targets: ["api:8000"]

volumes:
  pgdata:
  minio_data:
  prometheus_data:
  grafana_data: